spring:
  application:
    name: econ-pulse
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3308}/${MYSQL_DATABASE:econpulse}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=UTC
    username: ${MYSQL_USER:econpulse}
    password: ${MYSQL_PASSWORD:econpulse}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  jackson:
    time-zone: UTC
    mapper:
      allow-coercion-of-scalars: false
    deserialization:
      fail-on-unknown-properties: true

econpulse:
  popular-terms:
    key-prefix: ${ECONPULSE_POPULAR_TERMS_KEY_PREFIX:econpulse:popular-terms}
    retention: ${ECONPULSE_POPULAR_TERMS_RETENTION:7d}
    max-query-size: ${ECONPULSE_POPULAR_TERMS_MAX_QUERY_SIZE:100}
  news:
    provider:
      type: none
    naver:
      base-url: ${NAVER_NEWS_BASE_URL:https://openapi.naver.com}
      client-id: ${NAVER_NEWS_CLIENT_ID:}
      client-secret: ${NAVER_NEWS_CLIENT_SECRET:}
      connect-timeout: ${NAVER_NEWS_CONNECT_TIMEOUT:2s}
      read-timeout: ${NAVER_NEWS_READ_TIMEOUT:3s}
  internal:
    news-sync:
      enabled: false
    mapping-rebuild:
      enabled: ${ECONPULSE_INTERNAL_MAPPING_REBUILD_ENABLED:false}
    term-news-mapping:
      enabled: ${ECONPULSE_INTERNAL_TERM_NEWS_MAPPING_ENABLED:false}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState
        readiness:
          include: readinessState,db,redis
