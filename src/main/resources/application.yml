spring:
  application:
    name: econ-pulse
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3308}/${MYSQL_DATABASE:econpulse}?useUnicode=true&characterEncoding=UTF-8&connectionCollation=utf8mb4_unicode_ci&serverTimezone=UTC
    username: ${MYSQL_USER:econpulse}
    password: ${MYSQL_PASSWORD:econpulse}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
  jackson:
    time-zone: UTC
    deserialization:
      fail-on-unknown-properties: true

econpulse:
  news:
    provider:
      type: none
      base-url: ${NEWS_PROVIDER_BASE_URL:}
      connect-timeout: ${NEWS_PROVIDER_CONNECT_TIMEOUT:2s}
      read-timeout: ${NEWS_PROVIDER_READ_TIMEOUT:3s}
  internal:
    news-sync:
      enabled: false

server:
  port: ${SERVER_PORT:8080}
